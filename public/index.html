<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POLYBOT - Consenso API Real</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #0f0; margin: 0; padding: 20px; }
    h1 { color: #0f0; }
    .card { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 8px; }
    button { padding: 10px 20px; background: #0f0; color: black; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🚀 POLYBOT - Consenso API Real</h1>
  <div class="card">
    <h2>Estado</h2>
    <p id="status">Cargando...</p>
  </div>
  <div class="card">
    <h2>Bankroll</h2>
    <p id="bankroll">$0.00</p>
  </div>
  <div class="card">
    <h2>Posiciones Abiertas</h2>
    <p id="posiciones">0</p>
  </div>
  <div class="card">
    <h2>Trades Hoy</h2>
    <p id="tradesHoy">0</p>
  </div>
  <div class="card">
    <h2>Overlaps Detectados</h2>
    <p id="overlaps">0</p>
  </div>

  <script>
    async function actualizar() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        
        document.getElementById('status').innerHTML = data.status || 'ACTIVO';
        document.getElementById('bankroll').innerHTML = '$' + data.bankroll;
        document.getElementById('posiciones').innerHTML = data.posiciones;
        document.getElementById('tradesHoy').innerHTML = data.tradesHoy;
        document.getElementById('overlaps').innerHTML = data.overlapsHoy;
      } catch(e) {
        document.getElementById('status').innerHTML = 'Error de conexión';
      }
    }

    setInterval(actualizar, 5000);
    actualizar();
  </script>
</body>
</html>
